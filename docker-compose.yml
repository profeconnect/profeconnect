# PostgreSQL local para desarrollo y pruebas (AmigoJolive)
# Arranque: docker compose up -d postgres
# Asegúrate de configurar un archivo .env si deseas sobrescribir las credenciales.
# Cadena típica en backend/.env:
# DIRECT_URL="postgresql://${POSTGRES_USER:-amigo}:${POSTGRES_PASSWORD:-amigo_dev}@localhost:5432/${POSTGRES_DB:-amigojolive}"
# DATABASE_URL="postgresql://${POSTGRES_USER:-amigo}:${POSTGRES_PASSWORD:-amigo_dev}@localhost:5432/${POSTGRES_DB:-amigojolive}"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amigo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-amigo_dev}
      POSTGRES_DB: ${POSTGRES_DB:-amigojolive}
    volumes:
      - amigojolive_pg:/var/lib/postgresql/data

volumes:
  amigojolive_pg:
